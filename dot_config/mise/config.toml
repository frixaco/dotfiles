[tools]
node = 'latest'
go = 'latest'
bun = 'latest'
deno = 'latest'
uv = 'latest'
zig = 'latest'
usage = 'latest'

"github:clangd/clangd" = "latest"
"aqua:LuaLS/lua-language-server" = "latest"

[settings]
npm.package_manager = "bun"

[tasks."lsp:install"]
description = "Install LSP tools (mise + uv + bun + rustup)"
run = [
  "mise install",
  "go install golang.org/x/tools/gopls@latest",
  "uv tool install --upgrade ruff",
  "uv tool install --upgrade ty",
  "bun install -g @johnnymorganz/stylua-bin@latest",
  "bun install -g @olrtg/emmet-language-server@latest",
  "bun install -g vscode-langservers-extracted@latest",
  "bun install -g @tailwindcss/language-server@latest",
  "bun install -g typescript-language-server@latest",
  "bun install -g @typescript/native-preview@latest",
  "bun install -g prettier@latest",
  "bun install -g eslint@latest",
  "uv tool install --upgrade clang-format",
  "rustup component add rust-analyzer --toolchain stable",
]

[tasks."lsp:doctor"]
description = "Check LSP binaries on PATH"
run = '''
#!/usr/bin/env bash
set -euo pipefail
bins=(
  rust-analyzer
  gopls
  stylua
  clangd
  clang-format
  lua-language-server
  ruff
  ty
  emmet-language-server
  vscode-eslint-language-server
  vscode-html-language-server
  vscode-css-language-server
  tailwindcss-language-server
  typescript-language-server
  tsgo
  prettier
  eslint
)
for bin in "${bins[@]}"; do
  printf "%s -> %s\n" "$bin" "$(command -v "$bin")"
done
'''
run_windows = [
  "where rust-analyzer",
  "where gopls",
  "where stylua",
  "where clangd",
  "where clang-format",
  "where lua-language-server",
  "where ruff",
  "where ty",
  "where emmet-language-server",
  "where vscode-eslint-language-server",
  "where vscode-html-language-server",
  "where vscode-css-language-server",
  "where tailwindcss-language-server",
  "where typescript-language-server",
  "where tsgo",
  "where prettier",
  "where eslint",
]

[tasks."lsp:sync"]
description = "Install then verify LSP stack"
run = [
  { task = "lsp:install" },
  { task = "lsp:doctor" },
]

[tasks."ai:install"]
description = "Install/update AI coding agents"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if ! command -v amp &> /dev/null; then
    curl -fsSL https://ampcode.com/install.sh | bash
fi

if ! command -v claude &> /dev/null; then
    curl -fsSL https://claude.ai/install.sh | bash
fi

if ! command -v opencode &> /dev/null; then
    bun install -g opencode-ai
fi

amp update
claude update
bun i -g @mariozechner/pi-coding-agent @openai/codex droid opencode-ai
'''

run_windows = [
  "pwsh -Command \"if (!(Get-Command amp -EA SilentlyContinue)) { irm https://ampcode.com/install.ps1 | iex } else { amp update }\"",
  "pwsh -Command \"if (!(Get-Command claude -EA SilentlyContinue)) { irm https://claude.ai/install.ps1 | iex } else { claude update }\"",
  "pwsh -Command \"if (!(Get-Command opencode -EA SilentlyContinue)) { bun install -g opencode-ai }\"",
  "bun i -g @mariozechner/pi-coding-agent @openai/codex droid opencode-ai",
]

[tasks."ai:doctor"]
description = "Check AI agent binaries on PATH"
run = '''
#!/usr/bin/env bash
bins=(amp claude opencode codex pi droid)
for bin in "${bins[@]}"; do
  printf "%s -> %s\n" "$bin" "$(command -v "$bin" 2>/dev/null || echo "NOT FOUND")"
done
'''

run_windows = [
  "where amp 2>nul || echo amp -^> NOT FOUND",
  "where claude 2>nul || echo claude -^> NOT FOUND",
  "where opencode 2>nul || echo opencode -^> NOT FOUND",
  "where codex 2>nul || echo codex -^> NOT FOUND",
  "where pi 2>nul || echo pi -^> NOT FOUND",
  "where droid 2>nul || echo droid -^> NOT FOUND",
]

[tasks."ai:sync"]
description = "Install then verify AI agents"
run = [
  { task = "ai:install" },
  { task = "ai:doctor" },
]
